name: Frobnicator Max 2000
components:
  - type: https://example.org/frobnicator/TargetingComponent
    name: Targetor Ultra
    weight: 4
    accuracy: 0.97
    manufacturer:
      name: ACME Corporation
      country: United States of America
  - type: https://example.org/frobnicator/AttenuationComponent
    name: Softinator 2
    weight: 5
    method: Proprietary, unpublished
    manufacturer:
      name: Wayne Enterprises
      country: United States of America
  - type: https://example.org/frobnicator/LoadingComponent
    name: LoadMeUpScotty
    rate: 18
    manufacturer:
      name: RAMJAC Corporation
      country: United States of America
  - type: https://example.org/frobnicator-foo/ServicingComponent
    # This is the Foo extension.
    name: Serviceator
    online: true
    nodes:
      # This is the Foo2 extension, an extension to the Foo
      # extension. It does not define a new Component type (so it is
      # not a "natural extension", but it adds a new field to the
      # new type added by the Foo extension.
      https://example.org/frobnicator-foo2/ServicingComponentFoo:
        mode: online
