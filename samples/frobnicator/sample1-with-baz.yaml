name: Frobnicator Max 2000
components:
  - type: https://example.org/frobnicator/TargetingComponent
    name: Targetor Ultra
    weight: 4
    accuracy: 0.97
    manufacturer:
      name: ACME Corporation
      country: United States of America
  - type: https://example.org/frobnicator/AttenuationComponent
    name: Softinator 2
    weight: 5
    method: Proprietary, unpublished
    manufacturer:
      name: Wayne Enterprises
      country: United States of America
  - type: https://example.org/frobnicator/LoadingComponent
    name: LoadMeUpScotty
    rate: 18
    manufacturer:
      type: https://example.org/frobnicator-baz/BazManufacturer
      # This is a "custom" extension, which relies on the fact that the
      # Manufacturer class has a type designator, allowing
      # implementations to recognise this is an extended type.
      name: RAMJAC Corporation
      country: United States of America
      # There is no need for an extension node here. The field can be
      # added alongside the other fields from the base class. An
      # implementation that does not know about the Baz extension
      # should still recognise this object as a base Manufacturer
      # object, and will ignore (but preserve) the `city` slot.
      city: Duckburg, Calisota
