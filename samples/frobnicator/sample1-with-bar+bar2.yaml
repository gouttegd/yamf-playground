name: Frobnicator Max 2000
components:
  - type: https://example.org/frobnicator/TargetingComponent
    name: Targetor Ultra
    weight: 4
    accuracy: 0.97
    manufacturer:
      name: ACME Corporation
      country: United States of America
  - type: https://example.org/frobnicator/AttenuationComponent
    name: Softinator 2
    weight: 5
    method: Proprietary, unpublished
    manufacturer:
      name: Wayne Enterprises
      country: United States of America
  - type: https://example.org/frobnicator/LoadingComponent
    name: LoadMeUpScotty
    rate: 18
    manufacturer:
      name: RAMJAC Corporation
      country: United States of America
nodes:
  https://example.org/frobnicator-bar/FrobnicatorUsage:
    # This is the Bar extension, which adds the dual_use field to the
    # Frobnicator class.
    dual_use: true
  https://example.org/frobnicator-bar2/FrobnicatorRealUsage:
    # This is another extension, which adds another field to the
    # Frobnicator class. This is an example of extension composability.
    civilian_fraction: 0.6
