id: https://example.org/ome
name: ome
description: Playground for a LinkML version of the OME model
prefixes:
  linkml: https://w3id.org/linkml/
  ome: https://example.org/ome/
default_prefix: ome
imports:
  - linkml:types
default_range: string

slots:

  id:
    range: uriorcurie
    identifier: true

classes:

  ManufacturerSpec:
    mixin: true
    attributes:
      lot_number:
      manufacturer:
      model:
      serial_number:

  Microscope:
    mixins:
      - ManufacturerSpec
    attributes:
      type:
        range: MicroscopeType

  MicroscopeComponent:
    mixins:
      - ManufacturerSpec
    slots:
      - id
    attributes:
      component_type:
        designates_type: true
  
  Detector:
    is_a: MicroscopeComponent
    attributes:
      gain:
        range: float
      voltage:
        range: float
      voltage_unit:
        range: ElectricPotentialUnit
      offset:
        range: float
      zoom:
        range: float
      amplification_gain:
        range: float
      type:
        range: DetectorType

  Objective:
    is_a: MicroscopeComponent
    attributes:
      correction:
        range: CorrectionType
      immersion:
        range: ImmersionType
      lens_na:
        range: float
      nominal_magnification:
        range: float
      calibrated_magnification:
        range: float
      working_distance:
        range: float
      working_distance_unit:
        range: LengthUnit
      iris:
        range: boolean

  FilterSet:
    is_a: MicroscopeComponent
    attributes:
      emission_filters:
        # Non-inlined list of references to filter objects
        range: Filter
        multivalued: true
      dichroic:
        # Non-inlined reference to a Dichroic object
        range: Dichroic
      excitation_filters:
        # Non-inlined list of references to filter objects
        range: Filter
        multivalued: true

  Filter:
    is_a: MicroscopeComponent
    attributes:
      type:
        range: FilterType
      filter_wheel:
      transmittance_range:
        range: TransmittanceRange

  Dichroic:
    is_a: MicroscopeComponent

  Instrument:
    slots:
      - id
    attributes:
      microscope:
        range: Microscope
        inlined: true
      light_source:
        range: LightSource
        inlined: true
      components:
        range: MicroscopeComponent
        multivalued: true
        inlined: true
        inlined_as_list: true

  LightSource:
    mixins:
      - ManufacturerSpec
    slots:
      - id
    attributes:
      power:
        range: float
      power_unit:
        range: PowerUnit
      light_source_type:
        designates_type: true

  ArcLightSource:
    is_a: LightSource
    attributes:
      type:
        range: ArcLightSourceType

  FilamentLightSource:
    is_a: LightSource
    attributes:
      type:
        range: FilamentLightSourceType

  LaserLightSource:
    is_a: LightSource
    attributes:
      type:
        range: LaserLightSourceType
      medium:
        range: LaserMedium
      wavelength:
        range: float
        minimum_value: 0.0
      wavelength_unit:
        range: LengthUnit
      frequency_multiplication:
        range: integer
        minimum_value: 0
      tuneable:
        range: boolean
      pulse:
        range: LaserPulseType
      pockel_cell:
        range: boolean
      repetition_rate:
        range: float
      repetition_unit:
        range: FrequencyUnit
      pump:
        # Non-inlined reference to a light source object
        range: LightSource
  
  LightEmittingDiodeLightSource:
    is_a: LightSource

  GenericExcitationSource:
    # FIXME: Obviously this type had been designed as a way to have some kind of
    # built-in support for as-yet-unknown types of light source. Not sure we would
    # need it in the new OME/LiMi model, as we should be able to use the generic
    # extension mechanism (which is the entire point of the new model!) instead.
    # That extension mechanism should automatically apply to _all_ types in the
    # model, without having to explicitly define a GenericSomething.
    is_a: LightSource
    attributes:
      map:
        range: MapEntry
        multivalued: true
        inlined: true
        inlined_as_list: false

  MapEntry:
    attributes:
      key:
        key: true
      value:

  TransmittanceRange:
    attributes:
      cutin:
        range: float
        # FIXME: LinkML seemingly does not support exclusive boundaries,
        # so we can't mandate that the value must be strictly superior.
        # See: https://github.com/linkml/linkml/issues/1648
        minimum_value: 0.0
      cutin_unit:
        range: LengthUnit
      cutout:
        range: float
        minimum_value: 0.0
      cutout_unit:
        range: LengthUnit
      cutin_tolerance:
        range: float
        minimum_value: 0.0
      cutin_tolerance_Unit:
        range: LengthUnit
      cutout_tolerance:
        range: float
        minimum_value: 0.0
      cutout_tolerance_unit:
        range: LengthUnit
      transmittance:
        range: float
        minimum_value: 0.0
        maximum_value: 1.0

